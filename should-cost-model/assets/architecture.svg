<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="400" fill="#0f172a" rx="12"/>
  
  <text x="400" y="30" text-anchor="middle" fill="#f1f5f9" font-size="15" font-weight="bold">Should-Cost Modeling — How It Works</text>
  
  <!-- FRED API -->
  <rect x="30" y="55" width="200" height="55" rx="8" fill="#1e293b" stroke="#3b82f6"/>
  <text x="130" y="75" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="bold">FRED API (Public)</text>
  <text x="130" y="93" text-anchor="middle" fill="#f1f5f9" font-size="10">Copper · Steel · Aluminum</text>
  <text x="130" y="105" text-anchor="middle" fill="#94a3b8" font-size="9">PPI indices · FX rates</text>
  
  <!-- BOM Definition -->
  <rect x="300" y="55" width="200" height="55" rx="8" fill="#1e293b" stroke="#7c3aed"/>
  <text x="400" y="75" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="bold">BOM DEFINITION</text>
  <text x="400" y="93" text-anchor="middle" fill="#f1f5f9" font-size="10">Components × Quantities</text>
  <text x="400" y="105" text-anchor="middle" fill="#94a3b8" font-size="9">Each linked to a commodity driver</text>
  
  <!-- Labor -->
  <rect x="570" y="55" width="200" height="55" rx="8" fill="#1e293b" stroke="#f59e0b"/>
  <text x="670" y="75" text-anchor="middle" fill="#fde68a" font-size="10" font-weight="bold">LABOR RATES</text>
  <text x="670" y="93" text-anchor="middle" fill="#f1f5f9" font-size="10">Regional hourly rates</text>
  <text x="670" y="105" text-anchor="middle" fill="#94a3b8" font-size="9">CN $6.69 · MX $5.56 · US $28</text>
  
  <!-- Arrow -->
  <path d="M130 110 L130 140 L400 140 L400 155" stroke="#3b82f6" fill="none" stroke-width="2"/>
  <path d="M400 110 L400 155" stroke="#7c3aed" fill="none" stroke-width="2"/>
  <path d="M670 110 L670 140 L400 140" stroke="#f59e0b" fill="none" stroke-width="2"/>
  
  <!-- Calculation Engine -->
  <rect x="150" y="155" width="500" height="70" rx="8" fill="#1e3a5f" stroke="#3b82f6"/>
  <text x="400" y="177" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="bold">SHOULD-COST CALCULATION</text>
  <text x="400" y="198" text-anchor="middle" fill="#f1f5f9" font-size="11">component_cost = qty × unit_cost × commodity_multiplier(month)</text>
  <text x="400" y="215" text-anchor="middle" fill="#94a3b8" font-size="10">+ overhead (% of materials) + supplier margin → Should-Cost per unit</text>
  
  <!-- Outputs -->
  <path d="M280 225 L280 255" stroke="#22c55e" fill="none" stroke-width="2"/>
  <path d="M400 225 L400 255" stroke="#22c55e" fill="none" stroke-width="2"/>
  <path d="M520 225 L520 255" stroke="#22c55e" fill="none" stroke-width="2"/>
  
  <rect x="180" y="255" width="150" height="50" rx="8" fill="#14532d" stroke="#22c55e"/>
  <text x="255" y="275" text-anchor="middle" fill="#86efac" font-size="10" font-weight="bold">TIME SERIES</text>
  <text x="255" y="292" text-anchor="middle" fill="#f1f5f9" font-size="10">Historical trend</text>
  
  <rect x="350" y="255" width="150" height="50" rx="8" fill="#1e293b" stroke="#7c3aed"/>
  <text x="425" y="275" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="bold">12-MO FORECAST</text>
  <text x="425" y="292" text-anchor="middle" fill="#f1f5f9" font-size="10">±1.5σ interval</text>
  
  <rect x="520" y="255" width="150" height="50" rx="8" fill="#1e293b" stroke="#f59e0b"/>
  <text x="595" y="275" text-anchor="middle" fill="#fde68a" font-size="10" font-weight="bold">VARIANCE</text>
  <text x="595" y="292" text-anchor="middle" fill="#f1f5f9" font-size="10">Actual vs. Should</text>
  
  <!-- Action -->
  <rect x="200" y="330" width="400" height="45" rx="8" fill="#1e293b" stroke="#ef4444"/>
  <text x="400" y="350" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="bold">ACTION RECOMMENDATION</text>
  <text x="400" y="367" text-anchor="middle" fill="#f1f5f9" font-size="10">🔴 >+15%: Negotiate  🟡 +5-15%: Request breakdown  ⚪ ±5%: Monitor  🔵 <-5%: Validate quality</text>
</svg>
