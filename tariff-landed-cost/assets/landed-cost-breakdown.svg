<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="420" fill="#0f172a" rx="12"/>
  
  <text x="400" y="30" text-anchor="middle" fill="#f1f5f9" font-size="14" font-weight="bold">Landed Cost Breakdown — Example: China vs. Mexico vs. Vietnam</text>
  
  <!-- Column headers -->
  <text x="200" y="60" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="bold">CHINA (CN)</text>
  <text x="400" y="60" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="bold">MEXICO (MX)</text>
  <text x="600" y="60" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="bold">VIETNAM (VN)</text>
  
  <!-- FOB bars -->
  <text x="50" y="95" fill="#64748b" font-size="9">FOB Price</text>
  <rect x="120" y="80" width="160" height="22" rx="4" fill="#3b82f6"/><text x="200" y="95" text-anchor="middle" fill="white" font-size="10">$38.50</text>
  <rect x="320" y="80" width="160" height="22" rx="4" fill="#3b82f6"/><text x="400" y="95" text-anchor="middle" fill="white" font-size="10">$48.00</text>
  <rect x="520" y="80" width="160" height="22" rx="4" fill="#3b82f6"/><text x="600" y="95" text-anchor="middle" fill="white" font-size="10">$42.00</text>
  
  <!-- Freight -->
  <text x="50" y="130" fill="#64748b" font-size="9">Freight</text>
  <rect x="120" y="115" width="74" height="22" rx="4" fill="#7c3aed"/><text x="157" y="130" text-anchor="middle" fill="white" font-size="10">$4.62 (12%)</text>
  <rect x="320" y="115" width="38" height="22" rx="4" fill="#7c3aed"/><text x="339" y="130" text-anchor="middle" fill="white" font-size="10">$2.40 (5%)</text>
  <rect x="520" y="115" width="86" height="22" rx="4" fill="#7c3aed"/><text x="563" y="130" text-anchor="middle" fill="white" font-size="10">$5.88 (14%)</text>
  
  <!-- Duty -->
  <text x="50" y="165" fill="#64748b" font-size="9">Duty</text>
  <rect x="120" y="150" width="155" height="22" rx="4" fill="#ef4444"/><text x="197" y="165" text-anchor="middle" fill="white" font-size="10" font-weight="bold">$13.48 (35%)</text>
  <rect x="320" y="150" width="10" height="22" rx="4" fill="#22c55e"/><text x="345" y="165" fill="#22c55e" font-size="10">$0.00 (USMCA)</text>
  <rect x="520" y="150" width="60" height="22" rx="4" fill="#f59e0b"/><text x="550" y="165" text-anchor="middle" fill="white" font-size="10">$4.20 (10%)</text>
  
  <!-- MPF/HMF -->
  <text x="50" y="200" fill="#64748b" font-size="9">MPF/HMF</text>
  <rect x="120" y="185" width="20" height="22" rx="4" fill="#64748b"/><text x="155" y="200" fill="#94a3b8" font-size="10">$0.18</text>
  <rect x="320" y="185" width="20" height="22" rx="4" fill="#64748b"/><text x="355" y="200" fill="#94a3b8" font-size="10">$0.23</text>
  <rect x="520" y="185" width="20" height="22" rx="4" fill="#64748b"/><text x="555" y="200" fill="#94a3b8" font-size="10">$0.20</text>
  
  <!-- Divider -->
  <line x1="100" y1="220" x2="700" y2="220" stroke="#334155" stroke-width="1" stroke-dasharray="4,3"/>
  
  <!-- Total Landed -->
  <text x="50" y="250" fill="#f1f5f9" font-size="10" font-weight="bold">LANDED</text>
  <rect x="120" y="233" width="160" height="26" rx="5" fill="#450a0a" stroke="#ef4444"/>
  <text x="200" y="250" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="bold">$56.78</text>
  <rect x="320" y="233" width="160" height="26" rx="5" fill="#14532d" stroke="#22c55e"/>
  <text x="400" y="250" text-anchor="middle" fill="#86efac" font-size="12" font-weight="bold">$50.63</text>
  <rect x="520" y="233" width="160" height="26" rx="5" fill="#422006" stroke="#f59e0b"/>
  <text x="600" y="250" text-anchor="middle" fill="#fde68a" font-size="12" font-weight="bold">$52.28</text>
  
  <!-- Net Price & Margin -->
  <text x="50" y="285" fill="#64748b" font-size="9">Net Price</text>
  <text x="200" y="285" text-anchor="middle" fill="#f1f5f9" font-size="10">$89.99</text>
  <text x="400" y="285" text-anchor="middle" fill="#f1f5f9" font-size="10">$89.99</text>
  <text x="600" y="285" text-anchor="middle" fill="#f1f5f9" font-size="10">$89.99</text>
  
  <text x="50" y="315" fill="#f1f5f9" font-size="10" font-weight="bold">TRUE MARGIN</text>
  <text x="200" y="315" text-anchor="middle" fill="#f59e0b" font-size="13" font-weight="bold">36.9%</text>
  <text x="400" y="315" text-anchor="middle" fill="#22c55e" font-size="13" font-weight="bold">43.7%</text>
  <text x="600" y="315" text-anchor="middle" fill="#f59e0b" font-size="13" font-weight="bold">41.9%</text>
  
  <!-- Insight box -->
  <rect x="100" y="340" width="600" height="50" rx="8" fill="#1e293b" stroke="#334155"/>
  <text x="400" y="360" text-anchor="middle" fill="#f1f5f9" font-size="10" font-weight="bold">💡 Key Insight</text>
  <text x="400" y="378" text-anchor="middle" fill="#94a3b8" font-size="10">China's FOB is $9.50 cheaper than Mexico — but after 35% IEEPA tariff, Mexico lands $6.15 lower.</text>
  
  <text x="400" y="408" text-anchor="middle" fill="#475569" font-size="8">All prices are illustrative examples using the generic rate engine. No proprietary supplier data.</text>
</svg>
