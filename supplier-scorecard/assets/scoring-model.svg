<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="520" fill="#0f172a" rx="12"/>
  
  <text x="400" y="30" text-anchor="middle" fill="#f1f5f9" font-size="15" font-weight="bold">Supplier Scorecard — 4-Pillar Scoring Model</text>
  
  <!-- Four pillars -->
  <rect x="30" y="55" width="170" height="130" rx="8" fill="#1e293b" stroke="#3b82f6"/>
  <text x="115" y="78" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="bold">SHIP ON TIME</text>
  <text x="115" y="95" text-anchor="middle" fill="#f1f5f9" font-size="22" font-weight="bold">35%</text>
  <text x="115" y="118" text-anchor="middle" fill="#94a3b8" font-size="9">% on-time (10-day grace)</text>
  <text x="115" y="135" text-anchor="middle" fill="#22c55e" font-size="9">🟢 ≥94%</text>
  <text x="115" y="150" text-anchor="middle" fill="#f59e0b" font-size="9">🟡 ≥85%</text>
  <text x="115" y="165" text-anchor="middle" fill="#ef4444" font-size="9">🔴 &lt;85%</text>
  
  <rect x="220" y="55" width="170" height="130" rx="8" fill="#1e293b" stroke="#7c3aed"/>
  <text x="305" y="78" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="bold">QUALITY</text>
  <text x="305" y="95" text-anchor="middle" fill="#f1f5f9" font-size="22" font-weight="bold">25%</text>
  <text x="305" y="118" text-anchor="middle" fill="#94a3b8" font-size="9">PPM (defects per million)</text>
  <text x="305" y="135" text-anchor="middle" fill="#22c55e" font-size="9">🟢 ≤1,000 PPM</text>
  <text x="305" y="150" text-anchor="middle" fill="#f59e0b" font-size="9">🟡 ≤5,000 PPM</text>
  <text x="305" y="165" text-anchor="middle" fill="#ef4444" font-size="9">🔴 &gt;5,000 PPM</text>
  
  <rect x="410" y="55" width="170" height="130" rx="8" fill="#1e293b" stroke="#22c55e"/>
  <text x="495" y="78" text-anchor="middle" fill="#86efac" font-size="10" font-weight="bold">PRICING</text>
  <text x="495" y="95" text-anchor="middle" fill="#f1f5f9" font-size="22" font-weight="bold">20%</text>
  <text x="495" y="118" text-anchor="middle" fill="#94a3b8" font-size="9">YoY Δ vs. regional PPI</text>
  <text x="495" y="135" text-anchor="middle" fill="#22c55e" font-size="9">🟢 ≤0 (beating market)</text>
  <text x="495" y="150" text-anchor="middle" fill="#f59e0b" font-size="9">🟡 ≤+2pp</text>
  <text x="495" y="165" text-anchor="middle" fill="#ef4444" font-size="9">🔴 &gt;+2pp above PPI</text>
  
  <rect x="600" y="55" width="170" height="130" rx="8" fill="#1e293b" stroke="#f59e0b"/>
  <text x="685" y="78" text-anchor="middle" fill="#fde68a" font-size="10" font-weight="bold">COMMUNICATION</text>
  <text x="685" y="95" text-anchor="middle" fill="#f1f5f9" font-size="22" font-weight="bold">20%</text>
  <text x="685" y="118" text-anchor="middle" fill="#94a3b8" font-size="9">Survey: 70% EoDB + 30% Innov</text>
  <text x="685" y="135" text-anchor="middle" fill="#22c55e" font-size="9">🟢 ≥8.5 Strong</text>
  <text x="685" y="150" text-anchor="middle" fill="#f59e0b" font-size="9">🟡 ≥7.0 Solid</text>
  <text x="685" y="165" text-anchor="middle" fill="#ef4444" font-size="9">🔴 &lt;5.5 Needs Improvement</text>
  
  <!-- Arrows to composite -->
  <path d="M115 185 L115 210 L400 210 L400 230" stroke="#64748b" fill="none" stroke-width="1.5"/>
  <path d="M305 185 L305 210 L400 210" stroke="#64748b" fill="none" stroke-width="1.5"/>
  <path d="M495 185 L495 210 L400 210" stroke="#64748b" fill="none" stroke-width="1.5"/>
  <path d="M685 185 L685 210 L400 210" stroke="#64748b" fill="none" stroke-width="1.5"/>
  
  <!-- Composite -->
  <rect x="200" y="230" width="400" height="50" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="400" y="252" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="bold">COMPOSITE SCORE (0–100)</text>
  <text x="400" y="270" text-anchor="middle" fill="#f1f5f9" font-size="10">= 0.35×SOT + 0.25×Quality + 0.20×Pricing + 0.20×(Comm×10)</text>
  
  <!-- Arrow to tiers -->
  <path d="M400 280 L400 310" stroke="#3b82f6" fill="none" stroke-width="2"/>
  
  <!-- Tier classification -->
  <rect x="100" y="310" width="600" height="90" rx="8" fill="#1e293b" stroke="#334155"/>
  <text x="400" y="332" text-anchor="middle" fill="#f1f5f9" font-size="11" font-weight="bold">TIER CLASSIFICATION</text>
  
  <rect x="120" y="345" width="130" height="40" rx="6" fill="#14532d" stroke="#22c55e"/>
  <text x="185" y="363" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="bold">STRATEGIC</text>
  <text x="185" y="378" text-anchor="middle" fill="#86efac" font-size="9">≥90, 0 red</text>
  
  <rect x="265" y="345" width="130" height="40" rx="6" fill="#1e3a5f" stroke="#3b82f6"/>
  <text x="330" y="363" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="bold">PREFERRED</text>
  <text x="330" y="378" text-anchor="middle" fill="#93c5fd" font-size="9">≥80, 0 red</text>
  
  <rect x="410" y="345" width="130" height="40" rx="6" fill="#1e293b" stroke="#f59e0b"/>
  <text x="475" y="363" text-anchor="middle" fill="#fde68a" font-size="10" font-weight="bold">APPROVED</text>
  <text x="475" y="378" text-anchor="middle" fill="#fde68a" font-size="9">≥65 or 1 red</text>
  
  <rect x="555" y="345" width="130" height="40" rx="6" fill="#1c1917" stroke="#ef4444"/>
  <text x="620" y="363" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="bold">CONDITIONAL</text>
  <text x="620" y="378" text-anchor="middle" fill="#fca5a5" font-size="9">&lt;65 or 2+ red</text>
  
  <!-- Red flag override -->
  <rect x="200" y="420" width="400" height="35" rx="6" fill="#450a0a" stroke="#ef4444" stroke-dasharray="4,3"/>
  <text x="400" y="442" text-anchor="middle" fill="#fca5a5" font-size="10">⚠️ RED-FLAG OVERRIDE: 2+ red pillars → Conditional (regardless of composite)</text>
  
  <!-- Footer -->
  <text x="400" y="490" text-anchor="middle" fill="#64748b" font-size="9">Data sources: SOT CSV (delivery records) • Quality CSV (returns + AI classification) • Pricing CSV (YoY) • Survey CSV (quarterly)</text>
  <text x="400" y="505" text-anchor="middle" fill="#64748b" font-size="9">Inflation benchmark: FRED API (regional PPI) • Quality classification: Claude API (conservative bias)</text>
</svg>
